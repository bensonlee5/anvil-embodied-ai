# Smoke test config — Quest teleop, SINGLE ARM (right only),
# action[t] = observation.state[t] (act-from-obs opt-in via empty action_topics).
# Ported to the new unified converter schema.

data_space: "joint"

observation_topics:
  right: "/joint_states"

# Empty action_topics triggers act-from-obs: action[t] = observation.state[t].
# The future window is applied by LeRobot delta_timestamps at train time.
action_topics: {}

joint_names:
  separator: "_"
  source:
    follower: observation
  arms:
    r: right

observation_feature_mapping:
  state: "position"
  others: []

action_feature_mapping:
  state: "position"
  others: []

camera_topics:
  - "/cam_waist/image_raw/compressed"
  - "/cam_wrist_r/image_raw/compressed"
  - "/cam_chest/image_raw/compressed"

camera_topic_mapping:
  "/cam_waist/image_raw/compressed":  "waist"
  "/cam_wrist_r/image_raw/compressed": "wrist_r"
  "/cam_chest/image_raw/compressed":  "chest"

image_resolution: [640, 480]
