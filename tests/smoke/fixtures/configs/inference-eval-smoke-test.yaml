# =============================================================================
# Smoke-test inference config — SINGLE ARM (right), 3 cameras
# =============================================================================
# Used by pipeline_smoke_test.py step 4 (anvil-eval-ros) for both AFO and CMD
# scenarios.  Matches the fixture MCAP topology: right arm only, no wrist_l.
#
# Action topics are remapped to /eval/* so GT actions replayed by mcap_player
# can coexist alongside model predictions on the original topic names.

model:
  task_description: null

inference_tuning:

  act:
    n_action_steps: null
    temporal_ensemble_coeff: null

  diffusion:
    n_action_steps: null
    num_inference_steps: 10

  rtc:
    inference_delay: 10
    queue_trigger_threshold: 50
    execution_horizon: 12
    max_guidance_weight: 10.0
    prefix_attention_schedule: EXP

joint_state_topic: "/joint_states"

joint_names:
  model_joint_order:
    - finger_joint1
    - joint1
    - joint2
    - joint3
    - joint4
    - joint5
    - joint6
    - joint7

  controller_joint_order:
    - joint1
    - joint2
    - joint3
    - joint4
    - joint5
    - joint6
    - joint7
    - finger_joint1

  # Single arm right only — matches fixture MCAP and smoke-test trained model
  arm_mapping:
    r: right

  state_features:
    - position
    - velocity
    - effort

arms:
  right:
    ros_prefix: "follower_r"
    command_topic: "/eval/follower_r_forward_position_controller/commands"
    action_start: 0
    action_end: 8

# Fixture MCAPs have 3 cameras only (no wrist_l)
camera_mapping:
  "/cam_waist/image_raw/compressed": "waist"
  "/cam_wrist_r/image_raw/compressed": "wrist_r"
  "/cam_chest/image_raw/compressed": "chest"
