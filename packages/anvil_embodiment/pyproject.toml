[project]
name = "anvil-embodiment"
version = "0.1.0"
description = "Frozen-policy embodiment bridges and residual adapters for Anvil robots"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
dependencies = [
    "anvil-shared",
    "anvil-eval",
    "lerobot[dataset]~=0.6.0",
    "mujoco>=3.6.0",
    "numpy>=2.0.0,<2.3.0",
    "pyyaml~=6.0",
    "safetensors>=0.4.0",
    "torch>=2.7",
    "wandb~=0.27",
]

[project.optional-dependencies]
pi = ["lerobot[pi]~=0.6.0"]
dev = ["pytest>=8.0.0", "ruff>=0.4.0"]

[project.scripts]
anvil-adapter = "anvil_embodiment.cli:main"

[tool.uv.sources]
anvil-shared = { workspace = true }

anvil-eval = { workspace = true }
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/anvil_embodiment"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP"]
ignore = ["E501", "B008"]
