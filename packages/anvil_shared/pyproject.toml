[project]
name = "anvil-shared"
version = "0.1.0"
description = "Shared utilities used across anvil_trainer and anvil_eval (pure-Python, no ML deps)"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [
    { name = "Anvil Robotics", email = "dev@anvil.bot" }
]

# Intentionally dep-free: importable from any context (offline eval, ROS nodes,
# training) without pulling in torch / lerobot.
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "ruff>=0.4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/anvil_shared"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP"]
ignore = ["E501", "B008"]

[tool.pytest.ini_options]
python_files = ["test_*.py"]
