[project]
name = "anvil-trainer"
version = "0.1.0"
description = "Anvil training utilities with custom transforms — supports lerobot and other training platforms"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [
    { name = "Anvil Robotics", email = "dev@anvil.bot" }
]
keywords = ["robotics", "lerobot", "training", "imitation-learning"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Scientific/Engineering",
]

dependencies = [
    "anvil-shared",             # shared pure-python helpers (splits, etc.)
    "lerobot~=0.5.1",
    "torch>=2.2.1,<2.11.0",     # lerobot v0.5.0 official range; install from pytorch-cu128 index (see root pyproject.toml)
    "numpy>=2.0.0,<2.3.0",
    "wandb~=0.24",
    "pyyaml~=6.0",
    "tqdm~=4.67",
]

[project.optional-dependencies]
video = [
    "opencv-python>=4.8.0",
    "mcap>=1.1.0",
    "mcap-ros2-support>=0.5.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.0.0",
    "ruff>=0.4.0",
]

# =============================================================================
# Policy extras — pass-through to lerobot's optional-dependencies.
#
# ACT and Diffusion are included in the base install (no extra needed).
#
# Usage:
#   uv sync --all-packages --extra smolvla
#   uv sync --all-packages --extra smolvla --extra pi0
# =============================================================================
smolvla = ["lerobot[smolvla]~=0.5.1"]   # SmolVLA
pi      = ["lerobot[pi]~=0.5.1"]          # Pi0 / Pi0.5
all     = ["lerobot[smolvla,pi]~=0.5.1"]  # all policies

[project.scripts]
anvil-trainer = "anvil_trainer.train:main"

[tool.uv.sources]
anvil-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/anvil_trainer"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP"]
ignore = ["E501", "B008"]

[tool.pytest.ini_options]
python_files = ["test_*.py"]
