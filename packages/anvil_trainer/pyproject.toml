[project]
name = "anvil-trainer"
version = "0.1.0"
description = "Anvil training utilities with custom transforms — supports lerobot and other training platforms"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [
    { name = "Anvil Robotics", email = "dev@anvil.bot" }
]
keywords = ["robotics", "lerobot", "training", "imitation-learning"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Scientific/Engineering",
]

dependencies = [
    "anvil-shared",             # shared pure-python helpers (splits, etc.)
    "anvil-embodiment",         # task-space FK and constrained trajectory decoding
    "lerobot[training,diffusion]~=0.6.0",
    "torch>=2.7",     # Resolved through the CUDA 13.2 PyTorch index configured in the root pyproject.toml
    "numpy>=2.0.0,<2.3.0",
    "scipy>=1.14.0,<2.0.0",
    "wandb~=0.24",
    "pyyaml~=6.0",
    "tqdm~=4.67",
]

[project.optional-dependencies]
video = [
    "opencv-python>=4.8.0",
    "mcap>=1.1.0",
    "mcap-ros2-support>=0.5.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.0.0",
    "ruff>=0.4.0",
]

# =============================================================================
# Policy extras — pass-through to lerobot's optional-dependencies.
#
# ACT and Diffusion are included in the base install (no extra needed).
#
# Usage:
#   uv sync --all-packages --extra smolvla
#   uv sync --all-packages --extra smolvla --extra pi
# =============================================================================
smolvla        = ["lerobot[smolvla]~=0.6.0"]          # SmolVLA
pi             = ["lerobot[pi]~=0.6.0"]              # Pi0 / Pi0.5
sarm           = ["lerobot[sarm]~=0.6.0"]            # SARM reward model + RA-BC labeling
molmoact2      = ["lerobot[molmoact2]~=0.6.0"]       # MolmoAct2
groot          = ["lerobot[groot]~=0.6.0"]           # GR00T N1.7
multi_task_dit = ["lerobot[multi_task_dit]~=0.6.0"]  # Multitask DiT
evo1           = ["lerobot[evo1]~=0.6.0"]            # EVO1
fastwam        = ["lerobot[fastwam]~=0.6.0"]         # FastWAM
vla_jepa       = ["lerobot[vla_jepa]~=0.6.0"]        # VLA-JEPA
all            = ["lerobot[smolvla,pi,sarm,molmoact2,groot,multi_task_dit,evo1,fastwam,vla_jepa]~=0.6.0"]

[project.scripts]
anvil-trainer = "anvil_trainer.train:main"

[tool.uv.sources]
anvil-shared = { workspace = true }
anvil-embodiment = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/anvil_trainer"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP"]
ignore = ["E501", "B008"]

[tool.pytest.ini_options]
python_files = ["test_*.py"]
