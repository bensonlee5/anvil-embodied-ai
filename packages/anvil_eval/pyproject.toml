[project]
name = "anvil-eval"
version = "0.1.0"
description = "Anvil offline model evaluation — replay dataset episodes through trained policies"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [
    { name = "Anvil Robotics", email = "dev@anvil.bot" }
]
keywords = ["robotics", "lerobot", "evaluation", "imitation-learning"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Scientific/Engineering",
]

dependencies = [
    "lerobot[dataset,diffusion]~=0.6.0",
    "torch>=2.7",
    "numpy>=2.0.0,<2.3.0",
    "matplotlib>=3.8.0",
    "tqdm~=4.67",
    "pyyaml>=6.0",
    "pillow>=10.0",
]

[project.optional-dependencies]
wandb = ["wandb~=0.24"]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.0.0",
    "ruff>=0.4.0",
]
smolvla        = ["lerobot[smolvla]~=0.6.0"]
pi             = ["lerobot[pi]~=0.6.0"]
molmoact2      = ["lerobot[molmoact2]~=0.6.0"]
groot          = ["lerobot[groot]~=0.6.0"]
multi_task_dit = ["lerobot[multi_task_dit]~=0.6.0"]
evo1           = ["lerobot[evo1]~=0.6.0"]
fastwam        = ["lerobot[fastwam]~=0.6.0"]
vla_jepa       = ["lerobot[vla_jepa]~=0.6.0"]
all            = ["lerobot[smolvla,pi,molmoact2,groot,multi_task_dit,evo1,fastwam,vla_jepa]~=0.6.0", "wandb~=0.24"]

[project.scripts]
anvil-eval = "anvil_eval.cli:main"
anvil-sanity = "anvil_eval.sanity_cli:main"
# anvil-eval-ros moved to the anvil-eval-ros package (see packages/anvil_eval_ros/)

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/anvil_eval"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP"]
ignore = ["E501", "B008"]

[tool.pytest.ini_options]
python_files = ["test_*.py"]
