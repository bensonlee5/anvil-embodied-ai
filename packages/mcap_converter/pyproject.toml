[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mcap-converter"
version = "0.1.0"
description = "MCAP to LeRobot Dataset Converter - A modular conversion pipeline for transforming ROS2 MCAP recordings into LeRobot v3.0 format datasets"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
authors = [
    { name = "Anvil Robotics" }
]
keywords = ["mcap", "lerobot", "ros2", "robotics", "dataset", "conversion"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Scientific/Engineering",
]
dependencies = [
    "mcap~=1.3",
    "mcap-ros2-support~=0.5.7",
    "lerobot~=0.5.0",
    "numpy>=2.0.0,<2.3.0",
    "pillow~=12.1",
    "opencv-python~=4.11",
    "pyyaml~=6.0",
    "huggingface-hub>=1.0.0,<2.0.0",
    "rich>=13.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "black>=23.0.0",
    "ruff>=0.1.0",
    "mypy>=1.0.0",
]

[project.scripts]
mcap-convert = "mcap_converter.cli.convert:main"
mcap-inspect = "mcap_converter.cli.inspect:main"
dataset-validate = "mcap_converter.cli.validate:main"
mcap-upload = "mcap_converter.cli.upload:main"
mcap-to-video = "mcap_converter.cli.video:main"

[project.urls]
Homepage = "https://github.com/anvil-robotics/anvil-embodied-ai"
Repository = "https://github.com/anvil-robotics/anvil-embodied-ai"

[tool.hatch.build.targets.wheel]
packages = ["src/mcap_converter"]

[tool.hatch.build.targets.sdist]
include = [
    "/src",
    "/tests",
    "/README.md",
]

[tool.pytest.ini_options]
pythonpath = ["src"]

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
