# Matched offline-only ACT baseline for the outward-elbow task-space policy.
# Data, split, raw five-stage SARM sampling, transforms, action horizon, batch,
# and training budget match the Pi0.5 v4 experiment. The deliberate change is
# a scratch ACT policy with the standard ImageNet-initialized ResNet-18 visual
# backbone. This remains non-deployable until collision and controller parity
# gates for the task-space trajectory solver are proven.

dataset:
  repo_id: local
  root: datasets/shirt-fold/lerobot-hf-phase-aligned-sarm-5stage-v1
  video_backend: torchcodec
  image_transforms:
    enable: true
    max_num_transforms: 3
    random_order: true
    tfs:
      brightness:
        weight: 1.0
        type: ColorJitter
        kwargs: {brightness: [0.85, 1.15]}
      contrast:
        weight: 1.0
        type: ColorJitter
        kwargs: {contrast: [0.85, 1.15]}
      saturation:
        weight: 0.8
        type: ColorJitter
        kwargs: {saturation: [0.85, 1.15]}
      hue:
        weight: 0.5
        type: ColorJitter
        kwargs: {hue: [-0.03, 0.03]}
      sharpness:
        weight: 0.5
        type: SharpnessJitter
        kwargs: {sharpness: [0.8, 1.2]}
      affine:
        weight: 0.8
        type: RandomAffine
        kwargs:
          degrees: [-3.0, 3.0]
          translate: [0.03, 0.03]
          scale: [0.97, 1.03]
      blur:
        weight: 0.3
        type: GaussianBlur
        kwargs: {kernel_size: 3, sigma: [0.1, 1.0]}
      cutout:
        weight: 0.2
        type: RandomErasing
        kwargs: {p: 1.0, scale: [0.01, 0.04], ratio: [0.5, 2.0], value: 0}

policy:
  device: cuda
  use_amp: false
  push_to_hub: false

  chunk_size: 30
  n_action_steps: 30
  normalization_mapping:
    VISUAL: MEAN_STD
    STATE: MEAN_STD
    ACTION: IDENTITY
  input_features:
    observation.images.left_wrist: {type: VISUAL, shape: [3, 270, 480]}
    observation.images.right_wrist: {type: VISUAL, shape: [3, 270, 480]}
    observation.images.base: {type: VISUAL, shape: [3, 270, 480]}
    observation.state: {type: STATE, shape: [16]}
  output_features:
    action: {type: ACTION, shape: [14]}

  vision_backbone: resnet18
  pretrained_backbone_weights: ResNet18_Weights.IMAGENET1K_V1
  replace_final_stride_with_dilation: false
  pre_norm: false
  dim_model: 512
  n_heads: 8
  dim_feedforward: 3200
  feedforward_activation: relu
  n_encoder_layers: 4
  n_decoder_layers: 1
  use_vae: true
  latent_dim: 32
  n_vae_encoder_layers: 4
  temporal_ensemble_coeff: null
  dropout: 0.1
  kl_weight: 10.0
  optimizer_lr: 0.00001
  optimizer_lr_backbone: 0.00001
  optimizer_weight_decay: 0.0001

sample_weighting:
  type: rabc
  progress_path: sarm_progress_train_5stage_v1.parquet
  head_mode: dense
  kappa: 0.04932563304901121
  epsilon: 0.000001
  extra_params:
    audit_path: sarm_progress_audit_5stage_v1.json
    audit_sha256: 097b93f55918a8b37133ebf0a3d7ba899714435a0a52e6700dd72f8914a901eb
    source_progress_sha256: a27bd12d07c2dd0d6202f3040a44f2810031132f8dc1d8194bdde9d0ad567262
    training_progress_sha256: d52756786ef01f14218c3e4f95cf86e67ac7fea5a80433f5a0c387accda1b1ac
    semantic_manifest_sha256: 5b476d9cb72363093da636c032fc2a32db945bfbe37c86e04e2d0bbc71fcf768
    semantic_sarm_contract_sha256: b30aace47ba7e6b679964ac72c5ee518a31f1f22c947d4b3376760717462ad15
    reward_calibration: none
    negative_delta_audit_tolerance: 0.05

output_dir: model_zoo/shirt-fold/act-hf-task-space-outward-5stage-sarm-raw-v1-5k
job_name: shirt-fold-act-hf-task-space-outward-5stage-sarm-raw-v1-5k
seed: 1000
cudnn_deterministic: false
num_workers: 4
persistent_workers: true
batch_size: 16
steps: 5000
env_eval_freq: 0
log_freq: 100
save_checkpoint: true
save_freq: 500
use_policy_training_preset: true

wandb:
  enable: true
  disable_artifact: true
  project: openarm2-shirt-folding
