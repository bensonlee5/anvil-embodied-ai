# Offline representation experiment using the released five-stage SARM signal.
# The policy predicts 6-DoF TCP deltas and absolute grippers, not redundant
# joint configurations. A serialized constrained trajectory solver selects an
# outward-elbow configuration and enforces joint/velocity/acceleration bounds.
# Reward values remain raw: no isotonic, spline, or monotone reward fit.

dataset:
  repo_id: local
  root: datasets/shirt-fold/lerobot-hf-phase-aligned-sarm-5stage-v1
  video_backend: torchcodec
  image_transforms:
    enable: true
    max_num_transforms: 3
    random_order: true
    tfs:
      brightness:
        weight: 1.0
        type: ColorJitter
        kwargs: {brightness: [0.85, 1.15]}
      contrast:
        weight: 1.0
        type: ColorJitter
        kwargs: {contrast: [0.85, 1.15]}
      saturation:
        weight: 0.8
        type: ColorJitter
        kwargs: {saturation: [0.85, 1.15]}
      hue:
        weight: 0.5
        type: ColorJitter
        kwargs: {hue: [-0.03, 0.03]}
      sharpness:
        weight: 0.5
        type: SharpnessJitter
        kwargs: {sharpness: [0.8, 1.2]}
      affine:
        weight: 0.8
        type: RandomAffine
        kwargs:
          degrees: [-3.0, 3.0]
          translate: [0.03, 0.03]
          scale: [0.97, 1.03]
      blur:
        weight: 0.3
        type: GaussianBlur
        kwargs: {kernel_size: 3, sigma: [0.1, 1.0]}
      cutout:
        weight: 0.2
        type: RandomErasing
        kwargs: {p: 1.0, scale: [0.01, 0.04], ratio: [0.5, 2.0], value: 0}

policy:
  path: lerobot-data-collection/folding_final
  pretrained_revision: 695abe40dbf3aac04efda59c1501d748681fa0fb
  device: cuda
  use_amp: false
  push_to_hub: false

  chunk_size: 30
  n_action_steps: 30
  max_state_dim: 32
  max_action_dim: 32
  num_inference_steps: 10
  use_relative_actions: false
  relative_exclude_joints: []
  action_feature_names: [right_tcp.delta_x, right_tcp.delta_y, right_tcp.delta_z, right_tcp.delta_rx, right_tcp.delta_ry, right_tcp.delta_rz, right_gripper.absolute, left_tcp.delta_x, left_tcp.delta_y, left_tcp.delta_z, left_tcp.delta_rx, left_tcp.delta_ry, left_tcp.delta_rz, left_gripper.absolute]

  normalization_mapping: '{"VISUAL":"IDENTITY","STATE":"QUANTILES","ACTION":"IDENTITY"}'
  input_features: '{"observation.images.left_wrist":{"type":"VISUAL","shape":[3,270,480]},"observation.images.right_wrist":{"type":"VISUAL","shape":[3,270,480]},"observation.images.base":{"type":"VISUAL","shape":[3,270,480]},"observation.state":{"type":"STATE","shape":[16]}}'
  output_features: '{"action":{"type":"ACTION","shape":[14]}}'

  dtype: bfloat16
  gradient_checkpointing: true
  compile_model: false
  freeze_vision_encoder: false
  train_expert_only: true

  optimizer_lr: 0.00001
  optimizer_betas: [0.9, 0.95]
  optimizer_eps: 1.0e-8
  optimizer_weight_decay: 0.01
  optimizer_grad_clip_norm: 1.0
  scheduler_warmup_steps: 250
  scheduler_decay_steps: 5000
  scheduler_decay_lr: 0.000001

sample_weighting:
  type: rabc
  progress_path: sarm_progress_train_5stage_v1.parquet
  head_mode: dense
  kappa: 0.04932563304901121
  epsilon: 0.000001
  extra_params:
    audit_path: sarm_progress_audit_5stage_v1.json
    audit_sha256: 097b93f55918a8b37133ebf0a3d7ba899714435a0a52e6700dd72f8914a901eb
    source_progress_sha256: a27bd12d07c2dd0d6202f3040a44f2810031132f8dc1d8194bdde9d0ad567262
    training_progress_sha256: d52756786ef01f14218c3e4f95cf86e67ac7fea5a80433f5a0c387accda1b1ac
    semantic_manifest_sha256: 5b476d9cb72363093da636c032fc2a32db945bfbe37c86e04e2d0bbc71fcf768
    semantic_sarm_contract_sha256: b30aace47ba7e6b679964ac72c5ee518a31f1f22c947d4b3376760717462ad15
    reward_calibration: none
    negative_delta_audit_tolerance: 0.05

output_dir: model_zoo/shirt-fold/pi05-hf-task-space-outward-5stage-sarm-raw-v4-5k
job_name: shirt-fold-pi05-hf-task-space-outward-5stage-sarm-raw-v4-5k
seed: 1000
cudnn_deterministic: false
num_workers: 4
persistent_workers: true
batch_size: 16
steps: 5000
env_eval_freq: 0
log_freq: 100
save_checkpoint: true
save_freq: 500
use_policy_training_preset: true

wandb:
  enable: true
  disable_artifact: true
  project: openarm2-shirt-folding
