# Existing-data production candidate using the released five-stage SARM model.
# The raw reward remains immutable; only the train-only RA-BC progress is
# calibrated with the pinned offline isotonic/PCHIP contract. The action
# processor uses the v2 soft-limit representation and serialized cubic
# B-spline inference smoothing. Manual quality sampling remains the conservative
# blinded three-outcome prior; recenter and refinement behavior are neutral.

dataset:
  repo_id: local
  root: datasets/shirt-fold/lerobot-hf-phase-aligned-sarm-5stage-v1
  video_backend: torchcodec
  image_transforms:
    enable: true
    max_num_transforms: 3
    random_order: true
    tfs:
      brightness:
        weight: 1.0
        type: ColorJitter
        kwargs: {brightness: [0.85, 1.15]}
      contrast:
        weight: 1.0
        type: ColorJitter
        kwargs: {contrast: [0.85, 1.15]}
      saturation:
        weight: 0.8
        type: ColorJitter
        kwargs: {saturation: [0.85, 1.15]}
      hue:
        weight: 0.5
        type: ColorJitter
        kwargs: {hue: [-0.03, 0.03]}
      sharpness:
        weight: 0.5
        type: SharpnessJitter
        kwargs: {sharpness: [0.8, 1.2]}
      affine:
        weight: 0.8
        type: RandomAffine
        kwargs:
          degrees: [-3.0, 3.0]
          translate: [0.03, 0.03]
          scale: [0.97, 1.03]
      blur:
        weight: 0.3
        type: GaussianBlur
        kwargs: {kernel_size: 3, sigma: [0.1, 1.0]}
      cutout:
        weight: 0.2
        type: RandomErasing
        kwargs: {p: 1.0, scale: [0.01, 0.04], ratio: [0.5, 2.0], value: 0}

policy:
  path: lerobot-data-collection/folding_final
  pretrained_revision: 695abe40dbf3aac04efda59c1501d748681fa0fb
  device: cuda
  use_amp: false
  push_to_hub: false

  chunk_size: 30
  n_action_steps: 30
  max_state_dim: 32
  max_action_dim: 32
  num_inference_steps: 10
  use_relative_actions: false
  relative_exclude_joints: []
  action_feature_names: [right_joint_1.pos, right_joint_2.pos, right_joint_3.pos, right_joint_4.pos, right_joint_5.pos, right_joint_6.pos, right_joint_7.pos, right_gripper.pos, left_joint_1.pos, left_joint_2.pos, left_joint_3.pos, left_joint_4.pos, left_joint_5.pos, left_joint_6.pos, left_joint_7.pos, left_gripper.pos]

  normalization_mapping: '{"VISUAL":"IDENTITY","STATE":"QUANTILES","ACTION":"IDENTITY"}'
  input_features: '{"observation.images.left_wrist":{"type":"VISUAL","shape":[3,270,480]},"observation.images.right_wrist":{"type":"VISUAL","shape":[3,270,480]},"observation.images.base":{"type":"VISUAL","shape":[3,270,480]},"observation.state":{"type":"STATE","shape":[16]}}'
  output_features: '{"action":{"type":"ACTION","shape":[16]}}'

  dtype: bfloat16
  gradient_checkpointing: true
  compile_model: false
  freeze_vision_encoder: false
  train_expert_only: true

  optimizer_lr: 0.00001
  optimizer_betas: [0.9, 0.95]
  optimizer_eps: 1.0e-8
  optimizer_weight_decay: 0.01
  optimizer_grad_clip_norm: 1.0
  scheduler_warmup_steps: 250
  scheduler_decay_steps: 5000
  scheduler_decay_lr: 0.000001

sample_weighting:
  type: rabc
  progress_path: sarm_progress_train_5stage_calibrated_v2.parquet
  head_mode: dense
  kappa: 0.04759161785788849
  epsilon: 0.000001
  extra_params:
    audit_path: sarm_progress_audit_5stage_calibrated_v2.json
    audit_sha256: b400d2fdf3e9fc63a6e9336d761c93ea88b2668b5dc3b5c2c9a933f2d2284518
    source_progress_sha256: a27bd12d07c2dd0d6202f3040a44f2810031132f8dc1d8194bdde9d0ad567262
    training_progress_sha256: 1d7b501b085ece0e77bc52e6aa06484de43efefade5b964e9a495b3a8fb1f530
    semantic_manifest_sha256: 5b476d9cb72363093da636c032fc2a32db945bfbe37c86e04e2d0bbc71fcf768
    semantic_sarm_contract_sha256: b30aace47ba7e6b679964ac72c5ee518a31f1f22c947d4b3376760717462ad15
    progress_calibration_contract_sha256: 2efa8b9ccdffefbbbd68e95feac33dfed486447ca10ea61dc963b6f26376b4a1

output_dir: model_zoo/shirt-fold/pi05-hf-bounded-larchenko-5stage-sarm-v2-5k
job_name: shirt-fold-pi05-hf-bounded-larchenko-5stage-sarm-v2-5k
seed: 1000
cudnn_deterministic: false
num_workers: 0
persistent_workers: false
batch_size: 16
steps: 5000
env_eval_freq: 0
log_freq: 100
save_checkpoint: true
save_freq: 500
use_policy_training_preset: true

wandb:
  enable: true
  disable_artifact: true
  project: openarm2-shirt-folding
