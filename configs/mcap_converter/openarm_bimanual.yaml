# OpenArm MCAP -> LeRobot Conversion Configuration
# Teleop Mode: Leader-Follower (bimanual)
#
# Both leader (action) and follower (observation) joints are published on
# /joint_states. The converter uses the joint name prefixes follower_/leader_
# to separate them. This convention is hardcoded — see core/constants.py.

robot_state_topic: /joint_states

camera_topic_mapping:
  /cam_waist/image_raw/compressed:   waist
  /cam_wrist_r/image_raw/compressed: wrist_r
  /cam_chest/image_raw/compressed:   chest
  /cam_wrist_l/image_raw/compressed: wrist_l

image_resolution: [640, 480]

action_source: leader
arms: [left, right]
