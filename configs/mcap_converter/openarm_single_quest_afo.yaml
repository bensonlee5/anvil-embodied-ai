# OpenArm MCAP -> LeRobot Conversion Configuration
# Teleop Mode: future_observations (single arm, right)
#
# No recorded action topic — actions are synthesized as observation[t + n].

robot_state_topic: /joint_states

camera_topic_mapping:
  /cam_waist/image_raw/compressed:   waist
  /cam_wrist_r/image_raw/compressed: wrist_r
  /cam_chest/image_raw/compressed:   chest

image_resolution: [640, 480]

action_source: future_observations
arms: [right]
action_n_step: 10
