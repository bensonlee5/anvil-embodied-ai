# =============================================================================
# OpenArm MCAP to LeRobot — EE Cartesian, BIMANUAL — 16:9 variant (480×270)
# =============================================================================
#
# Use this config when the source cameras are 1920×1080 (16:9).
# image_resolution [480, 270] is an exact ÷4 downscale → no black bars.
# The 4:3 default (openarm_ee_bimanual.yaml) produces ~25% letterbox padding
# at the top/bottom, wasting activation memory and degrading visual features.
#
# Output (per frame; LeRobot delta_timestamps applies the future window
# at train time):
#   observation.state  float32 (16,)  =  [left:  x,y,z, qx,qy,qz,qw, gripper]
#                                        [right: x,y,z, qx,qy,qz,qw, gripper]
#   action             float32 (20,)  =  [left:  x,y,z, rot6d(6), gripper]
#                                        [right: x,y,z, rot6d(6), gripper]
#   observation.images.{chest,waist,wrist_l,wrist_r}  shape: (3, 270, 480)
#
# `action_topics: {}` is mandatory in EE mode — the action source is the same
# /ee_pose_<arm> message used for observation, encoded with rot6d.
# =============================================================================

data_space: "ee"

observation_topics:
  left:  "/ee_pose_left"
  right: "/ee_pose_right"

action_topics: {}

camera_topics:
  - "/cam_waist/image_raw/compressed"
  - "/cam_wrist_r/image_raw/compressed"
  - "/cam_chest/image_raw/compressed"
  - "/cam_wrist_l/image_raw/compressed"

camera_topic_mapping:
  "/cam_waist/image_raw/compressed":  "waist"
  "/cam_wrist_r/image_raw/compressed": "wrist_r"
  "/cam_chest/image_raw/compressed":  "chest"
  "/cam_wrist_l/image_raw/compressed": "wrist_l"

image_resolution: [480, 270]  # 16:9, exact ÷4 of 1920×1080 — no letterbox padding
