# =============================================================================
# OpenArm MCAP to LeRobot Conversion Configuration
# =============================================================================
# Teleop Mode: Quest (VR Controller)
#
# In this mode, actions are sent as position commands via separate ROS2
# command topics (std_msgs/Float64MultiArray) — one per arm. The
# /joint_states topic contains ONLY follower (observation) joints.
#
# For leader-follower teleop mode, see: openarm_bimanual.yaml
# =============================================================================

# ROS2 Topic containing follower joint states (sensor_msgs/JointState)
# In quest mode, this topic only has observation data (no leader joints)
robot_state_topic: "/joint_states"


# =============================================================================
# Joint Name Parsing
# =============================================================================
# In quest mode, the /joint_states topic only has follower joints:
#   "follower_r_joint1", "follower_l_finger_joint1", etc.
#
# The source mapping is still used to strip the "follower_" prefix and
# extract the arm identifier. A "leader" source is optional here since
# actions come from action_topics instead.

joint_names:
  separator: "_"

  # Source prefix -> role mapping
  # Only "follower" -> "observation" is required in quest mode
  source:
    follower: observation

  # Arm identifiers (same as leader-follower mode)
  arms:
    r: right
    l: left


# =============================================================================
# Action Topics (Quest Teleop)
# =============================================================================
# In quest mode, actions come from separate command topics instead of
# from leader joints in the joint_states topic.
#
# These topics publish std_msgs/Float64MultiArray with joint position
# commands. Each topic is mapped to an arm identifier.
#
# The joint ordering in the Float64MultiArray.data array must match
# the observation joint ordering for the corresponding arm.

action_topics:
  "/follower_l_forward_position_controller/commands":
    arm: "left"
    joint_order: ["joint1", "joint2", "joint3", "joint4", "joint5", "joint6", "joint7", "finger_joint1"]
  "/follower_r_forward_position_controller/commands":
    arm: "right"
    joint_order: ["joint1", "joint2", "joint3", "joint4", "joint5", "joint6", "joint7", "finger_joint1"]


# =============================================================================
# Camera Configuration
# =============================================================================

# ROS2 image topics (sensor_msgs/Image or sensor_msgs/CompressedImage)
camera_topics:
  - "/cam_waist/image_raw/compressed"
  - "/cam_wrist_r/image_raw/compressed"
  - "/cam_chest/image_raw/compressed"
  - "/cam_wrist_l/image_raw/compressed"

# Map ROS topics to dataset camera names
# These become: observation.images.{name}
camera_topic_mapping:
  "/cam_waist/image_raw/compressed": "waist"
  "/cam_wrist_r/image_raw/compressed": "wrist_r"
  "/cam_chest/image_raw/compressed": "chest"
  "/cam_wrist_l/image_raw/compressed": "wrist_l"

# Target image resolution [width, height]
image_resolution: [640, 480]


# =============================================================================
# Feature Extraction
# =============================================================================

# What to extract from observation joints (follower)
observation_feature_mapping:
  state: "position"      # Primary feature -> observation.state
  others:                # Additional features
    - "velocity"         # -> observation.velocity
    - "effort"           # -> observation.effort

# What to extract from action commands
# Note: Float64MultiArray only contains position commands,
# so 'others' should remain empty for quest mode.
action_feature_mapping:
  state: "position"      # Primary feature -> action
  others: []             # No additional action features


# =============================================================================
# Quick Reference
# =============================================================================
#
# Input (ROS topics):
#   /joint_states (sensor_msgs/JointState):
#     name: ["follower_r_joint1", ..., "follower_l_joint1", ...]
#     position: [0.1, 0.2, ..., 0.3, ...]
#     velocity: [0.01, 0.02, ..., 0.03, ...]
#     effort: [1.0, 2.0, ..., 3.0, ...]
#
#   /follower_l_forward_position_controller/commands (Float64MultiArray):
#     data: [0.1, 0.2, ..., 0.8]     # left arm target positions
#
#   /follower_r_forward_position_controller/commands (Float64MultiArray):
#     data: [0.3, 0.4, ..., 0.9]     # right arm target positions
#
# Output (LeRobot dataset):
#   observation.state     [16]  = [left_joints..., right_joints...]  (from follower)
#   observation.velocity  [16]  = [left_joints..., right_joints...]  (from follower)
#   observation.effort    [16]  = [left_joints..., right_joints...]  (from follower)
#   action                [16]  = [left_joints..., right_joints...]  (from command topics)
#   observation.images.waist    = camera0 frames
#   observation.images.chest    = camera2 frames
#   observation.images.wrist_r  = camera1 frames
#   observation.images.wrist_l  = camera3 frames

