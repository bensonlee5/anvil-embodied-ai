# OpenArm MCAP -> LeRobot Conversion Configuration
# Teleop Mode: Quest (bimanual)
#
# Actions arrive on per-arm Float64MultiArray command topics. The command
# topic name is derived from `arms` via the convention
# /follower_{l|r}_forward_position_controller/commands — see core/constants.py.

camera_topic_mapping:
  /cam_waist/image_raw/compressed:   waist
  /cam_wrist_r/image_raw/compressed: wrist_r
  /cam_chest/image_raw/compressed:   chest
  /cam_wrist_l/image_raw/compressed: wrist_l

image_resolution: [640, 480]

action_source: quest_teleop
arms: [left, right]
