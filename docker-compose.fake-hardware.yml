# Simulate real 2-PC cooperation via DDS + Bridge Network (no real robot needed).
#
# mock-robot  = Robot PC  — publishes synthetic camera frames and joint states
# monitor/inference = GPU PC — subscribes via CycloneDDS over the bridge network
#
# Profiles:
#   monitor   — FPS monitoring only (validates DDS connectivity + throughput, no GPU)
#   inference — full pipeline: model load → preprocess → select_action → publish (GPU)
#
# Usage:
#   # Monitor only (validates DDS + FPS, no model needed)
#   docker compose -f docker-compose.fake-hardware.yml --profile monitor up --build
#
#   # Full GPU inference — MODEL_PATH must be an absolute path or start with ./
#   MODEL_PATH=$(pwd)/model_zoo/my-task/checkpoints/last \
#   docker compose -f docker-compose.fake-hardware.yml --profile inference up --build
#
# Optional env overrides:
#   ROS_DOMAIN_ID — ROS domain (default: 42)
#   CAMERA_RES    — 480p | 720p (default: 480p)
#   CAMERA_FPS    — camera publish rate (default: 30)
#   CONFIG_FILE   — host path to config yaml (default: ./configs/lerobot_control/inference_default.yaml)
#   IMAGE_TAG     — Docker image tag (default: latest)
#   HF_CACHE      — host path to HuggingFace cache (default: ~/.cache/huggingface)
#                   VLA models (pi0/pi05/smolvla) need the PaliGemma tokenizer from this cache.

x-base: &base
  image: ghcr.io/anvil-robotics/lerobot-inference:${IMAGE_TAG:-latest}
  build:
    context: .
    dockerfile: docker/inference/Dockerfile
    args:
      LEROBOT_VERSION: ${LEROBOT_VERSION:-0.5.0}
      LEROBOT_EXTRAS: ${LEROBOT_EXTRAS:-}
  networks:
    - ros2_test
  environment:
    - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-42}
    - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    - CYCLONEDDS_URI=file:///workspace/configs/cyclonedds/test_bridge.xml
  volumes:
    - ./configs:/workspace/configs:ro

services:

  mock-robot:
    <<: *base
    container_name: lerobot-fake-robot
    profiles: [monitor, inference]
    command: >
      ros2 run lerobot_control mock_controller_node
        --ros-args
        -p timeout:=3600.0
        -p required_actions:=999999
        -p camera_resolution:=${CAMERA_RES:-480p}
        -p camera_fps:=${CAMERA_FPS:-30}
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f mock_controller_node > /dev/null"]
      start_period: 5s
      interval: 2s
      timeout: 3s
      retries: 15

  monitor:
    <<: *base
    container_name: lerobot-fake-monitor
    profiles: [monitor]
    volumes:
      - ${CONFIG_FILE:-./configs/lerobot_control/inference_default.yaml}:/workspace/config.yaml:ro
    depends_on:
      mock-robot:
        condition: service_healthy
    command: >
      ros2 launch lerobot_control inference.launch.py
        echo_topic_only:=true
        config_file:=/workspace/config.yaml

  inference:
    <<: *base
    container_name: lerobot-fake-inference
    profiles: [inference]
    volumes:
      # MODEL_PATH is required for --profile inference (see header comment for usage).
      # CONFIG_FILE defaults to inference_default.yaml if not set.
      - ${MODEL_PATH:-/dev/null}:/workspace/model:ro
      - ${CONFIG_FILE:-./configs/lerobot_control/inference_default.yaml}:/workspace/config.yaml:ro
      # HuggingFace model cache — VLA models (pi0/pi05/smolvla) need the PaliGemma tokenizer
      # at runtime. Set HF_CACHE to your host ~/.cache/huggingface when using a VLA model.
      # ACT/Diffusion models are unaffected if this is empty.
      # HuggingFace needs write access to create lock files when loading tokenizers.
      - ${HF_CACHE:-.docker_empty_hf_cache}:/root/.cache/huggingface
    depends_on:
      mock-robot:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # MODEL_PATH is mounted at /workspace/model. HF cache structure (blobs/ + snapshots/)
    # is auto-detected by inference_node — no need for MODEL_SNAPSHOT_PATH.
    command: ros2 launch lerobot_control inference.launch.py model_path:=/workspace/model config_file:=/workspace/config.yaml debug:=${DEBUG:-false}

networks:
  ros2_test:
    driver: bridge
